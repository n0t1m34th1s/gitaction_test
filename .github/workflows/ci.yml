name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build_and_release:
    name: Build C++ and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create tags and releases

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build C++ Project
        run: make

      - name: Package Artifact
        run: tar -czf test-release.tar.gz test  # Replace with your executable name and update tar name

      - name: Generate Timestamp & Tag
        id: vars
        run: |
          DATE=$(date +'%Y%m%d%H%M%S')
          TAG_NAME="v1.0.${DATE}"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.vars.outputs.tag_name }}',
              sha: context.sha
            })

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: Release ${{ steps.vars.outputs.tag_name }}
          body: "Automated build and release for commit ${{ github.sha }}."
          files: test-release.tar.gz
